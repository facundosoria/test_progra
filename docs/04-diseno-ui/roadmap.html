<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Codemon TCG — Learning Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;
  --bg2:#080d18;
  --panel-bg:#03060c;
  --text:#b8ccd8;
  --text2:#4e6270;
  --text3:#263040;
  --border:rgba(0,180,255,0.08);
  --topbar:50px;
  --panel-w:430px;
}
html,body{
  min-height:100%;background:var(--bg);
  color:var(--text);font-family:'JetBrains Mono',monospace;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,150,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,150,255,0.018) 1px,transparent 1px);
  background-size:54px 54px;
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  height:var(--topbar);
  background:rgba(4,6,12,0.97);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;gap:12px;padding:0 20px;
}
.tb-logo{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:900;
  letter-spacing:0.18em;color:#00d4ff;
  text-shadow:0 0 22px rgba(0,212,255,0.5);
  white-space:nowrap;
}
.tb-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.tb-sub{font-size:9.5px;letter-spacing:0.09em;color:var(--text2);white-space:nowrap}
.tb-gap{flex:1}
.tb-progress{
  font-size:9.5px;font-weight:700;letter-spacing:0.07em;color:#00d4ff;
  border:1px solid rgba(0,212,255,0.2);
  padding:3px 12px;border-radius:3px;
  background:rgba(0,212,255,0.05);
  white-space:nowrap;
}
.tb-hint{font-size:9px;color:var(--text3);letter-spacing:0.04em;display:none}
@media(min-width:640px){.tb-hint{display:block}}

/* ── MAIN SCROLL AREA ── */
.main{
  position:relative;z-index:1;
  transition:padding-right .32s ease;
  padding:28px 16px 80px;
}
.main.panel-open{padding-right:calc(var(--panel-w) + 16px)}
@media(max-width:640px){.main.panel-open{padding-right:16px}}

/* ── PHASES WRAPPER ── */
.phases{
  max-width:1160px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:0;
}

/* ── PHASE ROW ── */
.phase{
  display:flex;
  gap:0;
  align-items:stretch;
  position:relative;
}

/* Timeline column */
.ph-tl{
  width:52px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  position:relative;padding-top:14px;
}
@media(max-width:480px){.ph-tl{width:40px}}

.ph-badge{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--pc,#00d4ff);
  background:color-mix(in srgb,var(--pc,#00d4ff) 12%,var(--bg));
  box-shadow:0 0 16px color-mix(in srgb,var(--pc,#00d4ff) 28%,transparent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:11px;font-weight:900;
  color:var(--pc,#00d4ff);
  flex-shrink:0;z-index:1;position:relative;
}
@media(max-width:480px){.ph-badge{width:26px;height:26px;font-size:9px}}

/* Vertical connecting line */
.ph-tl::after{
  content:'';
  position:absolute;
  top:48px;bottom:0;
  left:50%;transform:translateX(-50%);
  width:1px;
  background:linear-gradient(to bottom,
    color-mix(in srgb,var(--pc,#00d4ff) 35%,transparent),
    color-mix(in srgb,var(--pc,#00d4ff) 8%,transparent)
  );
}
.phase:last-child .ph-tl::after{display:none}

/* ── PHASE CONTENT ── */
.ph-content{
  flex:1;min-width:0;
  border:1px solid color-mix(in srgb,var(--pc,#00d4ff) 16%,rgba(255,255,255,0.03));
  border-left:2.5px solid var(--pc,#00d4ff);
  border-radius:0 8px 8px 0;
  background:color-mix(in srgb,var(--pc,#00d4ff) 2.5%,rgba(5,8,14,0.92));
  margin-bottom:0;
  overflow:hidden;
}

.ph-hdr{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 16px;
  background:color-mix(in srgb,var(--pc,#00d4ff) 6%,rgba(3,6,12,0.96));
  border-bottom:1px solid color-mix(in srgb,var(--pc,#00d4ff) 12%,transparent);
}
.ph-title{
  font-family:'Orbitron',monospace;
  font-size:10.5px;font-weight:900;letter-spacing:0.1em;
  color:#daeaf8;
}
.ph-sub{
  font-size:9px;color:var(--text2);margin-left:auto;
  display:none;
}
@media(min-width:700px){.ph-sub{display:block}}

/* regular node grid */
.ph-body{
  padding:13px 14px;
  display:flex;flex-wrap:wrap;gap:7px;
}

/* ── SPLIT PHASE (Backend / Frontend) ── */
.ph-tracks{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-top:1px solid color-mix(in srgb,var(--pc,#00d4ff) 8%,transparent);
}
@media(max-width:620px){
  .ph-tracks{grid-template-columns:1fr}
}

.ph-track{
  padding:12px 14px;
}
.ph-track:first-child{
  border-right:1px solid rgba(255,255,255,0.05);
}
@media(max-width:620px){
  .ph-track:first-child{
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
}

.track-hdr{
  font-family:'Orbitron',monospace;
  font-size:8px;font-weight:700;letter-spacing:0.14em;
  color:var(--tc,#00d4ff);
  margin-bottom:10px;padding-bottom:7px;
  border-bottom:1px solid color-mix(in srgb,var(--tc,#00d4ff) 22%,transparent);
}
.track-nodes{display:flex;flex-wrap:wrap;gap:7px}

/* ── CONNECTOR between phases ── */
.ph-connector{
  display:flex;align-items:center;
  padding:5px 0;
  padding-left:25px; /* aligns with badge center */
  color:rgba(0,200,255,0.2);
  font-size:14px;line-height:1;
  position:relative;
}

/* ════════════════════════════════════════
   NODE CARDS  — compact redesign
════════════════════════════════════════ */
.node{
  position:relative;
  width:122px;
  padding:8px 10px 7px;
  cursor:pointer;

  background:linear-gradient(148deg,
    color-mix(in srgb,var(--nc) 7%,#090e1c) 0%,
    #05090f 100%
  );
  border:1px solid color-mix(in srgb,var(--nc) 15%,rgba(255,255,255,0.03));
  border-left:2px solid var(--nc);
  border-radius:3px 6px 6px 3px;

  box-shadow:
    0 -1px 9px color-mix(in srgb,var(--nc) 14%,transparent),
    0 2px 8px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.025);

  transition:background .15s,border-color .15s,box-shadow .18s,transform .15s;
  animation:nfade .4s ease both;
}
@media(max-width:480px){.node{width:calc(50% - 4px)}}
@media(max-width:320px){.node{width:100%}}

.node::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(to bottom,
    color-mix(in srgb,var(--nc) 5%,transparent) 0%,transparent 55%
  );
  pointer-events:none;
}

.node:hover{
  background:linear-gradient(148deg,
    color-mix(in srgb,var(--nc) 13%,#0d1428) 0%,
    #080e1c 100%
  );
  border-color:color-mix(in srgb,var(--nc) 55%,transparent);
  box-shadow:
    0 -2px 16px color-mix(in srgb,var(--nc) 32%,transparent),
    0 0 0 1px color-mix(in srgb,var(--nc) 22%,transparent),
    0 8px 22px color-mix(in srgb,var(--nc) 15%,transparent),
    inset 0 1px 0 color-mix(in srgb,var(--nc) 14%,rgba(255,255,255,0.04));
  transform:translateY(-3px) scale(1.03);
  z-index:10;
}

.node.active{
  border-color:var(--nc);
  box-shadow:
    0 -3px 20px color-mix(in srgb,var(--nc) 40%,transparent),
    0 0 0 1.5px var(--nc),
    0 6px 20px color-mix(in srgb,var(--nc) 18%,transparent);
  z-index:10;
}
.node.done{opacity:.45;filter:saturate(.25)}
.node.done .n-done-btn{opacity:1;background:var(--nc);border-color:var(--nc);color:#000}

/* icon + title row */
.n-head{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.n-icon{font-size:14px;line-height:1;flex-shrink:0;margin-top:1px}
.n-title{
  font-family:'Orbitron',monospace;
  font-size:7.5px;font-weight:700;letter-spacing:0.03em;
  color:#d5e8f5;line-height:1.35;
}

/* stars — 40% bigger than original 8px = 11px */
.n-stars{
  font-size:11px;letter-spacing:1px;
  color:var(--nc);line-height:1;
}

/* done button (shows on hover or when done) */
.n-done-btn{
  position:absolute;top:5px;right:5px;
  width:14px;height:14px;border-radius:50%;
  border:1px solid color-mix(in srgb,var(--nc) 35%,transparent);
  background:rgba(0,0,0,0.3);
  cursor:pointer;font-size:8px;color:transparent;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s,background .15s,color .15s;
}
.n-done-btn::after{content:'✓'}
.node:hover .n-done-btn{opacity:1}
.n-done-btn:hover{border-color:var(--nc);color:var(--nc)}

/* ── DETAIL PANEL ── */
.panel{
  position:fixed;top:var(--topbar);right:0;
  width:var(--panel-w);height:calc(100vh - var(--topbar));
  background:var(--panel-bg);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;z-index:300;
  display:flex;flex-direction:column;
}
.panel.open{transform:translateX(0)}
@media(max-width:600px){:root{--panel-w:100vw}}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:rgba(0,210,255,0.15);border-radius:2px}

.p-hdr{
  padding:16px 18px 13px;border-bottom:1px solid var(--border);
  background:rgba(6,10,18,0.97);
  position:sticky;top:0;z-index:2;
  display:flex;align-items:flex-start;gap:11px;flex-shrink:0;
}
.p-icon{font-size:26px;line-height:1;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-title{
  font-family:'Orbitron',monospace;font-size:12px;font-weight:700;
  letter-spacing:0.06em;color:#d8eaf8;margin-bottom:5px;line-height:1.2;
}
.p-badge{
  display:inline-flex;padding:3px 9px;border-radius:3px;
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:0.11em;
}
.p-close{
  width:26px;height:26px;border-radius:4px;flex-shrink:0;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .14s;
}
.p-close:hover{border-color:var(--text2);color:var(--text)}

.p-body{padding:16px 18px;flex:1}
.p-sec{margin-bottom:16px}
.p-sec-title{
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;
  letter-spacing:0.13em;color:var(--text3);
  margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border);
}
.p-meta{display:flex;gap:14px;align-items:flex-start}
.p-meta label{display:block;font-size:8px;color:var(--text3);margin-bottom:4px;letter-spacing:0.07em}

/* panel stars — 40% bigger than original 14px = ~20px */
.p-stars{font-size:20px;letter-spacing:2px;line-height:1;color:var(--pc,#00d4ff)}

.p-time{
  padding:4px 11px;border-radius:4px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--text);
}
.p-desc{font-size:11.5px;line-height:1.72;color:var(--text)}
.p-why{
  padding:11px 13px;
  border-left:2px solid var(--pc,#00d4ff);border-radius:0 5px 5px 0;
  background:color-mix(in srgb,var(--pc,#00d4ff) 5%,var(--panel-bg));
  border-top:1px solid color-mix(in srgb,var(--pc,#00d4ff) 11%,transparent);
  border-right:1px solid color-mix(in srgb,var(--pc,#00d4ff) 11%,transparent);
  border-bottom:1px solid color-mix(in srgb,var(--pc,#00d4ff) 11%,transparent);
  font-size:11.5px;line-height:1.65;color:var(--text);
}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  padding:3px 8px;border-radius:3px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  font-size:10px;color:var(--text2);
}
.dlinks{display:flex;flex-direction:column;gap:5px}
.dlink{
  display:flex;align-items:center;gap:7px;
  padding:6px 10px;border-radius:4px;
  background:rgba(0,210,255,0.04);border:1px solid rgba(0,210,255,0.1);
  color:#00d4ff;font-size:10px;text-decoration:none;
  transition:all .14s;
}
.dlink:hover{background:rgba(0,210,255,0.08);border-color:rgba(0,210,255,0.25)}

/* ── anim ── */
@keyframes nfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="topbar">
  <span class="tb-logo">CODEMON TCG</span>
  <span class="tb-sep"></span>
  <span class="tb-sub">LEARNING ROADMAP</span>
  <span class="tb-gap"></span>
  <span class="tb-progress" id="progressEl">0 / 41 completados</span>
  <span class="tb-sep"></span>
  <span class="tb-hint">click para detalles · ✓ marcar hecho · ESC cerrar</span>
</header>

<div class="main" id="main">
  <div class="phases" id="phases"></div>
</div>

<aside class="panel" id="panel"></aside>

<script>
/* ═══════════════════════════════════════════════════════════════
   PHASES — la estructura que ve el lector
   Cada phase agrupa nodos con una relación semántica clara.
   El lector ve: "Primero aprendo Fundamentos, luego el Core Stack
   (Backend y Frontend son pistas paralelas), luego Datos, etc."
═══════════════════════════════════════════════════════════════ */
const PHASES = [
  {
    id:0, label:'FUNDAMENTOS', color:'#6b82a8',
    sub:'Herramientas base + forma de trabajar',
    nodeIds:['git','cli','docker-basic','scrum','pasos','traceability']
  },
  {
    id:1, label:'CORE STACK', color:'#7c3aed',
    sub:'Backend y Frontend — pistas paralelas independientes',
    split:true,
    left:  {label:'BACKEND',  color:'#2563eb', nodeIds:['java21','spring-boot','spring-sec','spring-jpa','rest-api']},
    right: {label:'FRONTEND', color:'#e11d48', nodeIds:['typescript','angular','rxjs','tailwind','angular-guards']}
  },
  {
    id:2, label:'CAPA DE DATOS', color:'#16a34a',
    sub:'Persistencia, cache y almacenamiento de objetos',
    nodeIds:['postgres','flyway','redis','minio']
  },
  {
    id:3, label:'COMUNICACIÓN EN TIEMPO REAL', color:'#0891b2',
    sub:'WebSocket bidireccional para el juego online',
    nodeIds:['websocket','stomp','events']
  },
  {
    id:4, label:'TESTING & CALIDAD', color:'#0d9488',
    sub:'80% cobertura global — 90% motor de juego',
    nodeIds:['junit','testcontainers','jacoco','playwright']
  },
  {
    id:5, label:'MOTOR DEL JUEGO', color:'#dc2626',
    sub:'El componente más complejo — requiere todo lo anterior',
    nodeIds:['tcg-rules','state-machine','game-engine','elo']
  },
  {
    id:6, label:'FEATURES AVANZADAS', color:'#d97706',
    sub:'Pagos, autenticación social, matchmaking y chat',
    nodeIds:['mercadopago','oauth2','matchmaking','chat']
  },
  {
    id:7, label:'INFRAESTRUCTURA', color:'#7c3aed',
    sub:'Deploy con Docker · Nginx gateway · Monitoreo con Prometheus + Grafana',
    nodeIds:['docker-compose','nginx','env-config','prometheus','grafana','actuator']
  },
];

/* ═══════════════════════════════════════════════════════════════
   NODES — datos completos de cada tema
═══════════════════════════════════════════════════════════════ */
const NODES_LIST = [
  // ── FUNDAMENTOS ──
  {id:'git',icon:'🌿',title:'Git & GitFlow',diff:2,time:'3d',
   desc:'Sistema de control de versiones distribuido. GitFlow define ramas main/develop/feature/* para coordinar 3 equipos trabajando en paralelo sin pisarse los cambios.',
   why:'Los 3 equipos (A/B/C) trabajan en paralelo. Sin GitFlow los merges son un caos. Cada Historia de Usuario tiene su feature branch y se integra a develop tras PR review.',
   concepts:['git branch','git rebase','pull request','GitFlow','merge conflicts','conventional commits','git stash'],
   links:[{l:'GITFLOW.md',p:'../02-planificacion/00_guia/GITFLOW.md'},{l:'WORKFLOW_DIARIO.md',p:'../02-planificacion/00_guia/WORKFLOW_DIARIO.md'}]},

  {id:'cli',icon:'💻',title:'Terminal & CLI',diff:2,time:'2d',
   desc:'Dominio de línea de comandos: navegación de ficheros, variables de entorno, pipes, redirecciones y Bash básico. El proyecto incluye scripts en scripts/ que se ejecutan desde terminal.',
   why:'Todos los comandos del proyecto (docker compose, mvnw, ng, verify_paso.sh) se ejecutan desde terminal. Sin CLI fluida no puedes depurar problemas de contenedores ni correr la suite de tests.',
   concepts:['bash','env vars','chmod +x','curl','grep','pipes |','ssh','PATH'],
   links:[{l:'GITHUB_PROJECT_WORKFLOW.md',p:'../02-planificacion/00_guia/GITHUB_PROJECT_WORKFLOW.md'}]},

  {id:'docker-basic',icon:'🐳',title:'Docker Basics',diff:3,time:'3d',
   desc:'Docker encapsula servicios en contenedores aislados. Docker Compose orquesta los 10 servicios del stack completo con un solo comando. Imágenes multi-stage para builds optimizados.',
   why:'docker compose up -d --build arranca todo el stack en segundos. Sin entender Docker no puedes levantar el proyecto ni depurar el networking entre servicios (api→postgres, api→redis).',
   concepts:['image','container','volume','network','Dockerfile','docker compose','healthcheck','multi-stage build','env_file'],
   links:[{l:'docker-compose.yml',p:'../07-infraestructura/docker-compose.yml'},{l:'Dockerfile.api',p:'../07-infraestructura/Dockerfile.api'}]},

  {id:'scrum',icon:'📅',title:'Scrum — 12 Sprints',diff:2,time:'2d',
   desc:'Scrum con sprints de 1 semana (lunes-viernes), 3 equipos paralelos (A/B/C) y 12 sprints. Ceremonies: Planning (lunes), Daily, Review+Retro (viernes). Gates de sincronización coordinan dependencias.',
   why:'Sin entender los sprints y los gates no sabrás en qué puedes trabajar sin bloquear a otro equipo. Ej: el Frontend no integra el tablero real hasta que el GATE 2 (motor completo) esté verde.',
   concepts:['Sprint','Backlog refinement','Sprint Planning','Daily Scrum','Review','Retrospectiva','DoD','Gates de sincronización','Épicas'],
   links:[{l:'README.md (planificación)',p:'../02-planificacion/README.md'},{l:'DOD.md',p:'../02-planificacion/04_proceso/DOD.md'}]},

  {id:'pasos',icon:'🤖',title:'Sistema de PASOS',diff:3,time:'2d',
   desc:'Los PASOS son unidades atómicas de implementación en archivos PASO_S{sprint}_{n}.md. Cada uno define qué construir, los context_files, el contrato y el comando de verificación.',
   why:'Es el flujo de trabajo principal con IA. En lugar de "implementa el motor de juego", el sistema dice "implementa PASO_S03_01: GameEngine.processAction()". Verificable con ./verify_paso.sh.',
   concepts:['PASO_*.md structure','context_files loading','contratos de implementación','verify_paso.sh','ESTADO_PASOS.md','HISTORIAL_PASOS.md','CONVENCIONES.md'],
   links:[{l:'README.md (dev con IA)',p:'../08-desarrollo-con-ia/README.md'},{l:'CONVENCIONES.md',p:'../08-desarrollo-con-ia/CONVENCIONES.md'},{l:'ESTADO_PASOS.md',p:'../08-desarrollo-con-ia/ESTADO_PASOS.md'}]},

  {id:'traceability',icon:'🔗',title:'Trazabilidad HU→Paso',diff:2,time:'1d',
   desc:'Vincula cada Historia de Usuario con el PASO que la implementa, el PR de GitHub que la mergea y el Gate que la valida. TRAZABILIDAD_PASOS_HU.yml es la fuente de la matriz.',
   why:'Sin trazabilidad es imposible saber si una HU está implementada. HU-AUTH-03 → PASO_S01_02 → PR #42 → GATE 1a. Los scripts sincronizan automáticamente con GitHub Projects.',
   concepts:['HU → PASO → PR mapping','TRAZABILIDAD_PASOS_HU.yml','GitHub Projects','sync-traceability-github.sh','Gates de sincronización','burndown tracking'],
   links:[{l:'TRAZABILIDAD_PASOS_HU.md',p:'../08-desarrollo-con-ia/TRAZABILIDAD_PASOS_HU.md'}]},

  // ── BACKEND ──
  {id:'java21',icon:'☕',title:'Java 21',diff:3,time:'1w',

   links:[{l:'prometheus.yml',p:'../07-infraestructura/prometheus.yml'},{l:'MONITOREO.md',p:'../05-referencia-tecnica/MONITOREO.md'}]},

  {id:'grafana',icon:'📈',title:'Grafana Dashboards',diff:2,time:'2d',
   desc:'Visualiza métricas de Prometheus. 4 dashboards provisionados: Negocio (partidas activas, registros, pagos), Sistema (CPU, latencia), PostgreSQL y Redis.',
   why:'El dashboard de negocio muestra KPIs reales: sobres abiertos, Codemones en circulación. Si las partidas activas caen a 0 en horario pico, algo falló. Es el panel de control de operaciones.',
   concepts:['data source','panel types (graph/stat/table)','PromQL en Grafana','dashboard variables','alerting','provisioning via YAML','annotations'],
   links:[{l:'grafana-datasource.yml',p:'../07-infraestructura/grafana-datasource.yml'},{l:'MONITOREO.md',p:'../05-referencia-tecnica/MONITOREO.md'}]},

  {id:'actuator',icon:'🩺',title:'Spring Actuator',diff:2,time:'1d',
   desc:'Expone /actuator/health, /actuator/metrics, /actuator/prometheus. Micrometer permite añadir métricas de negocio custom. Docker Compose depende de /health para el healthcheck.',
   why:'El healthcheck de Docker Compose usa /actuator/health. Sin este endpoint, depends_on: condition: service_healthy no funciona y los servicios arrancan antes que la API esté lista.',
   concepts:['/actuator/health','/actuator/metrics','/actuator/prometheus','MeterRegistry','@Timed','Counter','Gauge','HealthIndicator custom'],
   links:[{l:'MONITOREO.md',p:'../05-referencia-tecnica/MONITOREO.md'}]},
];

// Index por id para lookup rápido
const NODES = Object.fromEntries(NODES_LIST.map(n => [n.id, n]));
const TOTAL = NODES_LIST.length;

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let activeId = null;
function getDone() { return JSON.parse(localStorage.getItem('rm-v3-done') || '[]'); }
function saveDone(d) { localStorage.setItem('rm-v3-done', JSON.stringify(d)); }

/* ─────────────────────────────────────────
   RENDER NODE HTML
───────────────────────────────────────── */
function nodeHTML(id, color) {
  const n = NODES[id];
  if (!n) return '';
  const done = getDone().includes(id);
  const stars = '★'.repeat(n.diff) + '☆'.repeat(5 - n.diff);
  return `
    <div class="node${done ? ' done' : ''}" data-id="${id}" style="--nc:${color}">
      <div class="n-head">
        <span class="n-icon">${n.icon}</span>
        <span class="n-title">${n.title}</span>
      </div>
      <div class="n-stars">${stars}</div>
      <button class="n-done-btn" title="Marcar completado"></button>
    </div>`;
}

/* ─────────────────────────────────────────
   BUILD PHASES
───────────────────────────────────────── */
function buildPhases() {
  const container = document.getElementById('phases');

  PHASES.forEach((ph, pi) => {
    // connector between phases
    if (pi > 0) {
      const conn = document.createElement('div');
      conn.className = 'ph-connector';
      conn.innerHTML = '▼';
      container.appendChild(conn);
    }

    const row = document.createElement('div');
    row.className = 'phase';
    row.style.setProperty('--pc', ph.color);

    // body HTML
    let bodyHTML;
    if (ph.split) {
      const leftNodes = ph.left.nodeIds.map(id => nodeHTML(id, ph.left.color)).join('');
      const rightNodes = ph.right.nodeIds.map(id => nodeHTML(id, ph.right.color)).join('');
      bodyHTML = `
        <div class="ph-tracks">
          <div class="ph-track" style="--tc:${ph.left.color}">
            <div class="track-hdr">⬡ ${ph.left.label}</div>
            <div class="track-nodes">${leftNodes}</div>
          </div>
          <div class="ph-track" style="--tc:${ph.right.color}">
            <div class="track-hdr">⬡ ${ph.right.label}</div>
            <div class="track-nodes">${rightNodes}</div>
          </div>
        </div>`;
    } else {
      const nodesHTML = ph.nodeIds.map(id => nodeHTML(id, ph.color)).join('');
      bodyHTML = `<div class="ph-body">${nodesHTML}</div>`;
    }

    row.innerHTML = `
      <div class="ph-tl">
        <div class="ph-badge">${ph.id}</div>
      </div>
      <div class="ph-content">
        <div class="ph-hdr">
          <span class="ph-title">${ph.label}</span>
          <span class="ph-sub">${ph.sub}</span>
        </div>
        ${bodyHTML}
      </div>`;

    container.appendChild(row);

    // node click events
    row.querySelectorAll('.node').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('.n-done-btn')) toggleDone(el.dataset.id);
        else openPanel(el.dataset.id);
      });
    });
  });
}

/* ─────────────────────────────────────────
   PANEL
───────────────────────────────────────── */
function openPanel(id) {
  const n = NODES[id];
  if (!n) return;

  // find phase color
  let color = '#00d4ff';
  for (const ph of PHASES) {
    if (ph.split) {
      if (ph.left.nodeIds.includes(id))  { color = ph.left.color;  break; }
      if (ph.right.nodeIds.includes(id)) { color = ph.right.color; break; }
    } else if (ph.nodeIds.includes(id)) { color = ph.color; break; }
  }

  document.querySelectorAll('.node.active').forEach(el => el.classList.remove('active'));
  const card = document.querySelector(`.node[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  activeId = id;
  const stars = '★'.repeat(n.diff) + '☆'.repeat(5 - n.diff);
  const chips = n.concepts.map(c => `<span class="chip">${c}</span>`).join('');
  const links = n.links.map(l => `<a class="dlink" href="${l.p}" target="_blank">📄 ${l.l}</a>`).join('');

  document.getElementById('panel').innerHTML = `
    <div class="p-hdr">
      <span class="p-icon">${n.icon}</span>
      <div class="p-info">
        <div class="p-title">${n.title}</div>
        <span class="p-badge" style="background:color-mix(in srgb,${color} 12%,transparent);color:${color};border:1px solid color-mix(in srgb,${color} 25%,transparent)">
          ${color === '#2563eb' ? 'BACKEND' : color === '#e11d48' ? 'FRONTEND' : PHASES.find(p => p.nodeIds?.includes(id) || (p.left?.nodeIds.includes(id)) || (p.right?.nodeIds.includes(id)))?.label || ''}
        </span>
      </div>
      <button class="p-close" onclick="closePanel()">✕</button>
    </div>
    <div class="p-body">
      <div class="p-sec">
        <div class="p-sec-title">// DIFICULTAD &amp; TIEMPO</div>
        <div class="p-meta">
          <div>
            <label>DIFFICULTY</label>
            <div class="p-stars" style="color:${color}">${stars}</div>
          </div>
          <div>
            <label>TIEMPO EST.</label>
            <span class="p-time">⏱ ${n.time}</span>
          </div>
        </div>
      </div>
      <div class="p-sec">
        <div class="p-sec-title">// QUÉ ES?</div>
        <p class="p-desc">${n.desc}</p>
      </div>
      <div class="p-sec">
        <div class="p-sec-title">// POR QUÉ IMPORTA EN CODEMON TCG?</div>
        <div class="p-why" style="--pc:${color}">${n.why}</div>
      </div>
      <div class="p-sec">
        <div class="p-sec-title">// CONCEPTOS CLAVE</div>
        <div class="chips">${chips}</div>
      </div>
      ${links ? `<div class="p-sec"><div class="p-sec-title">// DOCS DEL PROYECTO</div><div class="dlinks">${links}</div></div>` : ''}
    </div>`;

  document.getElementById('panel').classList.add('open');
  document.getElementById('main').classList.add('panel-open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('main').classList.remove('panel-open');
  document.querySelectorAll('.node.active').forEach(el => el.classList.remove('active'));
  activeId = null;
}

/* ─────────────────────────────────────────
   DONE
───────────────────────────────────────── */
function toggleDone(id) {
  const done = getDone();
  const i = done.indexOf(id);
  i === -1 ? done.push(id) : done.splice(i, 1);
  saveDone(done);
  refreshDone();
}

function refreshDone() {
  const done = getDone();
  document.querySelectorAll('.node').forEach(el => {
    el.classList.toggle('done', done.includes(el.dataset.id));
  });
  const doneBtns = document.querySelectorAll('.n-done-btn');
  doneBtns.forEach(btn => {
    const nodeEl = btn.closest('.node');
    if (nodeEl) {
      const isDone = done.includes(nodeEl.dataset.id);
      if (isDone) {
        btn.style.background = 'var(--nc)';
        btn.style.borderColor = 'var(--nc)';
        btn.style.color = '#000';
        btn.style.opacity = '1';
      } else {
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
        btn.style.opacity = '';
      }
    }
  });
  document.getElementById('progressEl').textContent = `${done.length} / ${TOTAL} completados`;
}

/* ─────────────────────────────────────────
   EVENTS
───────────────────────────────────────── */
document.addEventListener('keydown', e => { if (e.key === 'Escape' && activeId) closePanel(); });
document.getElementById('main').addEventListener('click', e => {
  if (activeId && !e.target.closest('.node') && !e.target.closest('.panel')) closePanel();
});

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
buildPhases();
refreshDone();
</script>
</body>
</html>
