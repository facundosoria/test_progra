global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'codemon'

scrape_configs:

  # API Spring Boot
  # IMPORTANTE: dentro de Docker usar el nombre del servicio "api", no "localhost"
  - job_name: 'codemon-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'api'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: 'postgres'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
        labels:
          service: 'redis'
