server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: codemon-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codemon_db}
    username: ${DB_USER:codemon_user}
    password: ${DB_PASSWORD:codemon_pass}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${EMAIL_SMTP_HOST:smtp.gmail.com}
    port: ${EMAIL_SMTP_PORT:587}
    username: ${EMAIL_USERNAME:dev@codemon.com}
    password: ${EMAIL_PASSWORD:dev}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

codemon:
  jwt:
    secret: ${JWT_SECRET:codemon-dev-jwt-secret-key-placeholder-32chars-min}
    expiry-ms: ${JWT_EXPIRY_MS:900000}
    refresh-expiry-ms: ${REFRESH_TOKEN_EXPIRY_MS:604800000}
  minio:
    endpoint: http://${MINIO_HOST:localhost}:${MINIO_PORT:9000}
    access-key: ${MINIO_USER:codemon}
    secret-key: ${MINIO_PASSWORD:codemon123}
    bucket: ${MINIO_BUCKET:codemon-cards}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:8088/minio}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8088}
  mercadopago:
    access-token: ${MP_ACCESS_TOKEN:TEST-placeholder}
    sandbox: ${MP_SANDBOX:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
