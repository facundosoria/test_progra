# Docker Compose overlay for production HTTPS.
# Usage:
#   docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Local development keeps using docker-compose.yml only: http://localhost:8088

services:
  api:
    environment:
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      MP_SANDBOX: ${MP_SANDBOX:-false}

  front:
    # Replace the local 8088:80 port mapping. Production exposes only HTTP/HTTPS.
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      - ./front/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERTS_DIR:-./infra/certs}:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Production must expose only Nginx publicly. Internal services stay on Docker network.
  postgres:
    ports: !override []

  redis:
    ports: !override []

  minio:
    ports: !override []

  prometheus:
    ports: !override []

  grafana:
    ports: !override []
