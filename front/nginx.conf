server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ──────────────────────────────────────────────────────
    # API REST — proxy al backend Spring Boot
    # Mantiene el prefijo /api: /api/cards → api:8080/api/cards
    # ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ──────────────────────────────────────────────────────
    # WebSocket STOMP — partidas en tiempo real
    # ──────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ──────────────────────────────────────────────────────
    # Actuator — health checks y métricas
    # ──────────────────────────────────────────────────────
    location /actuator/ {
        proxy_pass http://api:8080/api/actuator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ──────────────────────────────────────────────────────
    # Swagger UI y OpenAPI docs
    # ──────────────────────────────────────────────────────
    location /swagger-ui {
        proxy_pass http://api:8080/api/swagger-ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v3/api-docs {
        proxy_pass http://api:8080/api/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ──────────────────────────────────────────────────────
    # MinIO — imágenes de cartas via gateway
    # Habilitar en PASO_S02_02 junto con el servicio minio
    # ──────────────────────────────────────────────────────
    # location /minio/ {
    #     proxy_pass http://minio:9000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_read_timeout 60s;
    #     add_header Cache-Control "public, max-age=31536000, immutable";
    # }

    # ──────────────────────────────────────────────────────
    # Angular SPA — cualquier ruta que no sea archivo → index.html
    # Debe ir LAST para no interceptar rutas de proxy
    # ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos compilados
    location ~* \.(js|css|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
