<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">Codemon TCG</span>
    </div>

    <h2 class="auth-title">Iniciar sesión</h2>

    <div *ngIf="errorMessage" class="auth-error">
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          [class.invalid]="email.invalid && email.touched"
          autocomplete="email"
        />
        <span class="field-error" *ngIf="email.invalid && email.touched">
          <span *ngIf="email.errors?.['required']">El email es requerido.</span>
          <span *ngIf="email.errors?.['email']">Email inválido.</span>
        </span>
      </div>

      <div class="form-field">
        <label for="password">Contraseña</label>
        <div class="password-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Mínimo 8 caracteres"
            [class.invalid]="password.invalid && password.touched"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
        <span class="field-error" *ngIf="password.invalid && password.touched">
          <span *ngIf="password.errors?.['required']">La contraseña es requerida.</span>
          <span *ngIf="password.errors?.['minlength']">Mínimo 8 caracteres.</span>
        </span>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe" />
          Recordarme
        </label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading">Cargando...</span>
      </button>
    </form>

    <div class="auth-divider">
      <span>o continuá con</span>
    </div>

    <div class="oauth-buttons">
      <button class="btn-oauth" [disabled]="true" title="Coming soon">
        <span>Google</span>
      </button>
      <button class="btn-oauth" [disabled]="true" title="Coming soon">
        <span>GitHub</span>
      </button>
    </div>

    <p class="auth-link">
      ¿No tenés cuenta? <a routerLink="/auth/register">Registrate</a>
    </p>
  </div>
</div>
