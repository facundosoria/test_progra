    due_on: "2026-06-14"
  - title: "S4 — Motor: combate"
    description: "AttackPipeline + KO + premios completos."
    due_on: "2026-06-21"
  - title: "S5 — PvE jugable"
    description: "UI mínima → bot easy → game over end-to-end."
    due_on: "2026-06-28"
  - title: "S6 — Tablero pulido + Lobby"
    description: "Drag & drop completo + 3 tabs lobby + chat."
    due_on: "2026-07-05"
  - title: "S7 — PvP en tiempo real"
    description: "Sala privada + matchmaking ranked + WebSocket."
    due_on: "2026-07-12"
  - title: "S8 — Tienda + 2FA + métricas"
    description: "MP sandbox + sobres + 2FA + Grafana."
    due_on: "2026-07-19"
  - title: "S9 — Social v1"
    description: "Ligas + amigos + leaderboard + noticias."
