# project-fields.yml
# Contrato de estructura del GitHub Project v2 — Codemon TCG
# Los agentes MCP leen este archivo para conocer los campos disponibles
# y sus valores válidos antes de crear o actualizar issues.

project:
  name: "Codemon TCG — Development"
  description: "Tablero principal de desarrollo del juego de cartas Codemon TCG"
  visibility: private

fields:
  - name: Status
    type: single_select
    description: "Estado actual del item en el flujo de trabajo"
    options:
      - value: Backlog
        color: "🔵"
        description: "Definido pero no iniciado"
      - value: Pendiente
        color: "⚪"
        description: "Listo para iniciar, esperando desarrollador"
      - value: En progreso
        color: "🟡"
        description: "Activamente en desarrollo"
      - value: En revisión
        color: "🟠"
        description: "PR abierto, esperando code review"
      - value: Done
        color: "🟢"
        description: "PR mergeado, criterios de aceptación verificados"
      - value: Blocked
        color: "🔴"
        description: "Bloqueado por dependencia o impedimento"

  - name: Priority
    type: single_select
    description: "Prioridad de negocio del item"
    options:
      - value: Alta
        color: "🔴"
      - value: Media
        color: "🟡"
      - value: Baja
        color: "🟢"

  - name: Type
    type: single_select
    description: "Tipo de item de trabajo"
    options:
      - value: Epic
        description: "Agrupa historias de usuario por funcionalidad"
      - value: Historia
        description: "Unidad de valor entregable (Historia de Usuario)"
      - value: Bug
        description: "Error o comportamiento inesperado"
      - value: Spike
        description: "Investigación técnica sin entregable directo"

  - name: Epic
    type: text
    description: "ID de la épica a la que pertenece este item (ej: EPIC-04)"

  - name: Team
    type: single_select
    description: "Equipo responsable"
    options:
      - value: "Equipo A"
        description: "Backend núcleo (Motor, Auth, APIs core)"
      - value: "Equipo B"
        description: "Frontend Angular + Tailwind CSS"
      - value: "Equipo C"
        description: "Backend auxiliar + DevOps"
      - value: "All"
        description: "Responsabilidad compartida entre todos"

  - name: Story Points
    type: number
    description: "Estimación en Story Points (escala Fibonacci: 1,2,3,5,8,13,21)"

  - name: Sprint
    type: iteration
    description: "Sprint al que pertenece este item"
    iterations:
      - title: "S0 — Kickoff"
        duration: 7
      - title: "S1 — Auth básica"
        duration: 7
      - title: "S2 — Catálogo + Mazos"
        duration: 7
      - title: "S3 — Motor: setup + turnos"
        duration: 7
      - title: "S4 — Motor: combate"
        duration: 7
      - title: "S5 — PvE jugable"
        duration: 7
      - title: "S6 — Tablero pulido + Lobby"
        duration: 7
      - title: "S7 — PvP en tiempo real"
        duration: 7
      - title: "S8 — Tienda + 2FA + métricas"
        duration: 7
      - title: "S9 — Social v1"
        duration: 7
      - title: "S10 — OAuth + Perfil"
        duration: 7
      - title: "S11 — Pulido + bots + E2E"
        duration: 7

milestones:
