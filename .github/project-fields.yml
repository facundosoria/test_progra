labels:
  - name: epic
    color: "7B68EE"
    description: "Épica funcional — agrupa historias"
  - name: historia
    color: "0075ca"
    description: "Historia de Usuario"
  - name: bug
    color: "d73a4a"
    description: "Error o comportamiento inesperado"
  - name: Backend
    color: "e4e669"
    description: "Trabajo en Spring Boot / Java"
  - name: Frontend
    color: "0052cc"
    description: "Trabajo en Angular"
  - name: DB
    color: "5319e7"
    description: "Base de datos, migraciones Flyway, vistas"
  - name: Testing
    color: "006b75"
    description: "Tests unitarios, integración, E2E"
  - name: DevOps
    color: "e99695"
    description: "Docker, CI/CD, Nginx, infraestructura"
  - name: Deploy
    color: "f9d0c4"
    description: "Relacionado con despliegue a producción"
  - name: blocked
    color: "b60205"
    description: "Bloqueado por dependencia o impedimento externo"
  - name: hotfix
    color: "ff0000"
    description: "Fix urgente para producción"
  - name: in-review
    color: "fbca04"
    description: "PR abierto, pendiente de code review"

# Convención de nombres de rama
branch_conventions:
  feature: "feature/{epic-slug}/{hu-id}-{short-description}"
  fix: "fix/{issue-number}-{short-description}"
  hotfix: "hotfix/{issue-number}-{short-description}"
  epic: "epic/{epic-id-lowercase}"
  examples:
    - "feature/auth/hu-01-01-registro-login"
    - "feature/motor/hu-04-06-attack-pipeline"
    - "fix/42-deck-validation-error"
    - "hotfix/99-payment-webhook-crash"

# Instrucciones para agentes MCP
agent_instructions:
  read_traceability:
    description: "Para asociar PASOS locales con HU/TT, epicas e items del Project"
    steps:
      - "Leer docs/08-desarrollo-con-ia/TRAZABILIDAD_PASOS_HU.yml como fuente de verdad"
      - "Usar paso_id para encontrar hu_id, epic_id, hu_issue_number y required_for_hu_done"
      - "No mover una HU a Done hasta que todos sus pasos requeridos esten DONE"
      - "Si hu_issue_number es null o github_sync=false, no actualizar GitHub Projects automaticamente"

  read_project_state:
    description: "Para leer el estado actual del proyecto"
    steps:
      - "Usar list_issues con label=historia y state=open para ver HU pendientes"
      - "Filtrar por campo Sprint para ver qué está en el sprint actual"
      - "Agrupar por campo Status para el reporte de estado"

  create_issue_from_backlog:
    description: "Para crear un issue desde el docs/02-planificacion/backlog-master.md"
    steps:
      - "Leer el bloque YAML front-matter de la tarjeta en docs/02-planificacion/backlog-master.md"
      - "Usar create_issue con title=hu-id + nombre, labels=[labels del front-matter]"
      - "Asignar milestone según el campo sprint del front-matter"
      - "Agregar al Project y setear campos: Priority, Type, Team, Story Points, Epic, Sprint"
      - "Linkear al Issue de épica padre agregando referencia en el body"

  move_on_pr_open:
    description: "Cuando se abre un PR, mover issue a En revisión"
    steps:
      - "Extraer issue number del branch name o PR body"
      - "Usar update_project_item para setear Status=En revisión"

  move_on_pr_merge:
    description: "Cuando se mergea un PR, cerrar issue y mover a Done"
    steps:
      - "Cerrar el issue linkeado con close_issue"
      - "Setear Status=Done en el Project"
      - "Verificar si todos los hijos de la épica están Done; si sí, cerrar épica"

  daily_standup_report:
    description: "Generar reporte diario de estado"
    query: "list_issues(state=open, labels=historia) grouped by Status field"
    format: "## Standup {fecha}\n### En progreso\n### En revisión\n### Bloqueados"

# Mapeo de terminología: proyecto → GitHub
terminology_mapping:
  "Épica":
    github_entity: "Issue con label 'epic'"
    nota: "NO usar Milestone para épicas"
  "Sprint":
    github_entity: "Milestone de GitHub (S0, S1, ... S11)"
    nota: "Cada sprint es un Milestone con due date"
  "Historia de Usuario":
    github_entity: "Issue hijo con label 'historia', linked al issue de épica"
    nota: "El issue referencia al issue de épica en el body"
  "Tarea Técnica":
    github_entity: "Checklist dentro del Issue de su HU"
    nota: "NO crear issue separado para TT; son items de checklist en la HU"
