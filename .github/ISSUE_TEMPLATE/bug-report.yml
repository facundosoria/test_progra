name: "🐛 Bug Report"
description: "Reportar un error o comportamiento inesperado"
labels: ["bug"]
body:
  - type: input
    id: ambiente
    attributes:
      label: "Ambiente"
      placeholder: "dev / staging / prod"
    validations:
      required: true
  - type: textarea
    id: descripcion
    attributes:
      label: "Descripción del bug"
      placeholder: "¿Qué pasó? ¿Qué esperabas que pasara?"
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: "Pasos para reproducir"
      placeholder: "1. Ir a...\n2. Hacer clic en...\n3. Ver error"
    validations:
      required: true
  - type: dropdown
    id: severidad
    attributes:
      label: "Severidad"
      options: ["Crítico (hotfix)", "Alto", "Medio", "Bajo"]
    validations:
      required: true
  - type: input
    id: rama
    attributes:
      label: "Rama Git sugerida"
      placeholder: "fix/nombre-del-bug o hotfix/nombre-urgente"
  - type: textarea
    id: contexto
    attributes:
      label: "Contexto adicional (logs, screenshots, etc)"
